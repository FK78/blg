<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background -->
  <circle cx="100" cy="100" r="90" fill="#1e1e2e" />
  
  <!-- Speech bubble / blog post shape -->
  <rect x="50" y="45" width="100" height="75" rx="12" fill="#cba6f7" />
  <polygon points="70,120 85,120 75,138" fill="#cba6f7" />
  
  <!-- Lines inside bubble -->
  <line x1="68" y1="67" x2="132" y2="67" stroke="#1e1e2e" stroke-width="4" stroke-linecap="round" />
  <line x1="68" y1="82" x2="120" y2="82" stroke="#1e1e2e" stroke-width="4" stroke-linecap="round" />
  <line x1="68" y1="97" x2="108" y2="97" stroke="#1e1e2e" stroke-width="4" stroke-linecap="round" />
  
  <!-- "blg" text -->
  <text x="100" y="172" font-family="monospace" font-size="36" font-weight="bold" fill="#cba6f7" text-anchor="middle">blg</text>
</svg>
